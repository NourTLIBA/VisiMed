services:
  - type: web
    name: visimed-api
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --no-input
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: POSTGRES_NAME
        fromDatabase:
          name: visimed-db
          property: database
      - key: POSTGRES_USER
        fromDatabase:
          name: visimed-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: visimed-db
          property: password
      - key: POSTGRES_HOST
        fromDatabase:
          name: visimed-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: visimed-db
          property: port

databases:
  - name: visimed-db
    databaseName: visimed
    user: visimed
